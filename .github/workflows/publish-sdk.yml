name: Publish SDK to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & Publish lynxx-wallet-sdk
    runs-on: ubuntu-latest
    # Only run when the release tag starts with lynxx-wallet-sdk-v
    if: startsWith(github.ref_name, 'lynxx-wallet-sdk-v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm config set ignore-scripts true && pnpm install

      - name: Build SDK
        run: pnpm --filter lynxx-wallet-sdk run build

      - name: Publish to npm
        run: pnpm --filter lynxx-wallet-sdk publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
