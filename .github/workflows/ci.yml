name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    name: Soroban contracts — test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contract
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contract/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust Lints
        run: cargo fmt --check && cargo clippy -- -D warnings
        working-directory: contract

      - name: Security Audit
        run: |
          cargo install cargo-audit
          cargo audit
        working-directory: contract

      - name: Pre-build fund contract to WASM
        run: |
          rustup target add wasm32v1-none
          cargo build --target wasm32v1-none --release -p fund
        working-directory: contract

      - name: Run contract unit tests with coverage
        run: cargo llvm-cov --all-features --workspace

  frontend:
    name: Frontend — test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm config set ignore-scripts true && pnpm install

      - name: Frontend Lints
        run: pnpm run lint

      - name: Frontend Tests
        run: pnpm run test

      - name: Build production bundle
        run: pnpm run build
        env:
          CI: false
